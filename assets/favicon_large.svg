<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#0a0718"/>

  <!-- Outer glow -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#7b9fd4" stroke-width="0.5" opacity="0.3"/>

  <!-- Rays (8 directions) -->
  <g stroke="#c8a84b" stroke-width="1.2" stroke-linecap="round" opacity="0.8">
    <!-- Top -->
    <line x1="32" y1="8" x2="32" y2="14"/>
    <!-- Top-right -->
    <line x1="44" y1="12" x2="40" y2="16"/>
    <!-- Right -->
    <line x1="56" y1="32" x2="50" y2="32"/>
    <!-- Bottom-right -->
    <line x1="44" y1="52" x2="40" y2="48"/>
    <!-- Bottom -->
    <line x1="32" y1="56" x2="32" y2="50"/>
    <!-- Bottom-left -->
    <line x1="20" y1="52" x2="24" y2="48"/>
    <!-- Left -->
    <line x1="8" y1="32" x2="14" y2="32"/>
    <!-- Top-left -->
    <line x1="20" y1="12" x2="24" y2="16"/>
  </g>

  <!-- Inner circle with glow -->
  <defs>
    <radialGradient id="starGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#e8d7c3;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#b8c0d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b9fd4;stop-opacity:0.6" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Glow circle -->
  <circle cx="32" cy="32" r="7" fill="#7b9fd4" opacity="0.2" filter="url(#glow)"/>

  <!-- Center star circle -->
  <circle cx="32" cy="32" r="5.5" fill="url(#starGradient)" filter="url(#glow)"/>

  <!-- Highlight -->
  <circle cx="30" cy="30" r="1.5" fill="white" opacity="0.6"/>
</svg>